version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install flake8
          command: pip install flake8
      - run:
          name: Lint
          command: flake8 . --exclude=venv,.venv --max-line-length=100 --ignore=E501,W503

  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt pytest pytest-cov
      - run:
          name: Run tests
          command: pytest --tb=short -v

  build-docker:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker build -t voice-email:${CIRCLE_SHA1} .

workflows:
  build_and_test:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - build-docker:
          requires:
            - test
          filters:
            branches:
              only: master