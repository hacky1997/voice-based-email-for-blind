version: 2.1

orbs:
  python: circleci/python@2.1.1

jobs:
  lint:
    executor:
      name: python/default
      tag: "3.11"
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          packages: flake8
      - run:
          name: Lint
          command: flake8 . --exclude=venv,.venv --max-line-length=100 --ignore=E501,W503

  test:
    executor:
      name: python/default
      tag: "3.11"
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
          pip-dependency-file: requirements.txt
      - run:
          name: Install test deps
          command: pip install pytest pytest-cov
      - run:
          name: Run tests
          command: pytest --tb=short --cov=. --cov-report=xml -v
      - store_artifacts:
          path: coverage.xml

  build-docker:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: docker23
      - run:
          name: Build Docker image
          command: docker build -t voice-email:${CIRCLE_SHA1} .

workflows:
  build_and_test:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - build-docker:
          requires:
            - test
          filters:
            branches:
              only: main
